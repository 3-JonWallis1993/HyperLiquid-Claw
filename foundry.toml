[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "tests"
cache_path = "cache"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0xdeadbeef"

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
mainnet  = "${ETH_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
